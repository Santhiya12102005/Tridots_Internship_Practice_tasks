<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sample1</title>
    <link rel="stylesheet" href="sample1.css">
</head>
<body>
    <h1>Application Form</h1>
    <div>
    <form><br>
        <label for="Name">Name:</label>
        <input type="text" id="name" name="user_name"><br><br>

        <label for="rollno">Roll Number:</label>
        <input type="text" id="rollno" name="rollno"><br><br>
        
        <label for="dept">Department:</label>
        <select name="dept" id="dept">
            <option value="cse">CSE</option>
            <option value="cse">IT</option>
            <option value="cse">AIDS</option>
            <option value="cse">AIML</option>
            <option value="cse">EEE</option>
            <option value="cse">ECE</option>
            <option value="cse">MECH</option>
            <option value="cse">CIVIL</option>
        </select><br><br>
        
        <label for="section">Section:</label>
        <input type="radio" name="A" id="A">
        <label for="A">A</label>
        <input type="radio" name="B" id="B">
        <label for="B">B</label>
        <input type="radio" name="C" id="C">
        <label for="C">C</label><br><br>
        
        <label for="date">Date of joining:</label>
        <input type="date" name="date" id="date"><br><br>
        
        <label for="email">Enter your email:</label>
        <input type="email" id="email" name="email"><br><br>
        
        <label for="password">Password:</label>
        <input type="password" id="password" name="password"><br><br>
        
        <label for="aoi">Area of Interest:</label><br>
        <input type="checkbox" name="python" id="python">
        <label for="python">Python</label><br>
        <input type="checkbox" name="frappe" id="frappe">
        <label for="frappe">frappe</label><br>
        <input type="checkbox" name="database" id="database">
        <label for="database">Database</label><br><br>
        
        <label for="des">Description:</label><br>
        <textarea name="des" id="des" rows="5"></textarea><br><br>
        <button type="submit" class="submit">Submit</button>
        <button type="reset" class="reset">Reset</button><br>
        <br>
    </form>
    </div>
</body>
</html>
